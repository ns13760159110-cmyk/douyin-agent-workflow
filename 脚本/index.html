<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抖音智能创作助手</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0f0f0f;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:30px 16px}
.logo{font-size:32px;margin-bottom:6px}
h1{font-size:22px;font-weight:700;margin-bottom:4px}
.sub{color:#888;font-size:13px;margin-bottom:24px}
.tabs{display:flex;gap:6px;margin-bottom:20px;width:100%;max-width:680px;flex-wrap:wrap}
.tab{flex:1;min-width:80px;padding:10px 6px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;color:#888;font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all .2s}
.tab.active{background:#fe2c55;border-color:#fe2c55;color:#fff}
.card{background:#1a1a1a;border-radius:16px;padding:24px;width:100%;max-width:680px;margin-bottom:16px;border:1px solid #2a2a2a}
label{font-size:13px;color:#888;margin-bottom:8px;display:block}
textarea{width:100%;background:#0f0f0f;border:1px solid #333;border-radius:10px;color:#fff;font-size:15px;padding:14px;resize:vertical;min-height:120px;outline:none;line-height:1.6}
textarea:focus{border-color:#fe2c55}
textarea::placeholder{color:#444}
button.main{width:100%;padding:15px;background:linear-gradient(135deg,#fe2c55,#ff6b6b);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;margin-top:14px;transition:opacity .2s}
button.main:hover{opacity:.9}
button.main:disabled{opacity:.5;cursor:not-allowed}
.result-block{background:#0f0f0f;border-radius:10px;padding:14px;margin-top:12px;position:relative;border:1px solid #2a2a2a}
.result-label{font-size:12px;color:#fe2c55;margin-bottom:8px;font-weight:600}
.result-text{font-size:14px;line-height:1.8;color:#eee;white-space:pre-wrap;padding-right:50px}
.copy-btn{position:absolute;top:12px;right:12px;background:#2a2a2a;border:none;color:#aaa;padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer}
.copy-btn:hover{background:#333;color:#fff}
.loading{display:none;text-align:center;color:#888;padding:20px;font-size:14px}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid #333;border-top-color:#fe2c55;border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.error{color:#ff4444;font-size:13px;margin-top:10px;display:none;padding:10px;background:#2a0a0a;border-radius:8px}
.hint{font-size:12px;color:#555;margin-top:8px;line-height:1.5}
.section-title{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.clear-btn{background:none;border:1px solid #333;color:#888;padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer}
.clear-btn:hover{border-color:#fe2c55;color:#fe2c55}
.history-item{background:#0f0f0f;border-radius:10px;padding:14px;margin-bottom:10px;border:1px solid #2a2a2a}
.history-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.history-type{font-size:11px;color:#fe2c55;font-weight:600;background:#2a0a0a;padding:2px 8px;border-radius:4px}
.history-time{font-size:11px;color:#555}
.history-input{font-size:12px;color:#666;margin-bottom:8px;line-height:1.5;border-left:2px solid #333;padding-left:8px}
.history-output{font-size:13px;color:#ccc;line-height:1.7;white-space:pre-wrap}
.history-copy{background:#1a1a1a;border:none;color:#888;padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer;margin-top:8px}
.history-copy:hover{color:#fff}
.empty{text-align:center;color:#444;padding:30px;font-size:14px}
.progress-bar{width:100%;background:#2a2a2a;border-radius:6px;height:6px;margin:12px 0;overflow:hidden;display:none}
.progress-fill{height:100%;background:linear-gradient(90deg,#fe2c55,#ff6b6b);border-radius:6px;transition:width .4s;width:0}
.batch-item{background:#0f0f0f;border-radius:8px;padding:12px;margin-bottom:8px;position:relative}
.batch-item-label{font-size:11px;color:#fe2c55;margin-bottom:6px;font-weight:600}
.batch-item-text{font-size:13px;color:#ddd;line-height:1.7;white-space:pre-wrap;padding-right:50px}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px}
.dot-wait{background:#555}
.dot-running{background:#ffaa00;animation:pulse 1s infinite}
.dot-done{background:#00cc66}
.dot-error{background:#ff4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.status-row{display:flex;align-items:center;font-size:13px;color:#888;padding:6px 0;border-bottom:1px solid #1a1a1a}
.status-label{flex:1}
.panel{width:100%;max-width:680px}
.comment-list{max-height:400px;overflow-y:auto;margin-top:8px}
.comment-item{background:#0f0f0f;border-radius:8px;padding:10px 12px;margin-bottom:6px;border:1px solid #2a2a2a;position:relative}
.comment-item.hot{border-color:#ffaa00;box-shadow:0 0 8px rgba(255,170,0,.15)}
.comment-nick{font-size:12px;color:#fe2c55;font-weight:600;margin-bottom:4px}
.comment-text{font-size:13px;color:#ddd;line-height:1.6;padding-right:80px;white-space:pre-wrap}
.comment-meta{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.comment-likes{font-size:11px;color:#888}
.comment-likes.hot{color:#ffaa00}
.comment-send{background:#2a2a2a;border:none;color:#aaa;padding:2px 8px;border-radius:5px;font-size:11px;cursor:pointer}
.comment-send:hover{background:#333;color:#fff}
.comment-bar{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.comment-stats{font-size:12px;color:#666;margin-top:4px}
.monitor-item{background:#0f0f0f;border-radius:10px;padding:14px;margin-bottom:10px;border:1px solid #2a2a2a}
.monitor-title{font-size:14px;font-weight:600;color:#fff;margin-bottom:6px}
.monitor-meta{font-size:11px;color:#555;margin-bottom:8px}
.monitor-stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.monitor-stat{font-size:13px;color:#ddd}
.monitor-stat span{color:#fe2c55;font-weight:600}
.monitor-actions{display:flex;gap:8px}
.monitor-actions button{flex:1;padding:6px;border-radius:6px;border:1px solid #333;background:#1a1a1a;color:#aaa;font-size:11px;cursor:pointer}
.monitor-actions button:hover{background:#2a2a2a;color:#fff}
.trend-table{width:100%;border-collapse:collapse;margin-top:8px;font-size:12px}
.trend-table th{color:#888;padding:4px 6px;text-align:left;border-bottom:1px solid #2a2a2a}
.trend-table td{color:#ccc;padding:4px 6px;border-bottom:1px solid #1a1a1a}
.trend-table tr.latest td{color:#fff;background:rgba(254,44,85,.1);font-weight:600}
</style>
</head>
<body>
<div class="logo">🎬</div>
<h1>抖音智能创作助手</h1>
<p class="sub">文案改写 · 口播脚本 · 直播话术 · 批量生成</p>

<div class="tabs" id="tabBar">
  <div class="tab active" data-idx="0">✍️ 文案改写</div>
  <div class="tab" data-idx="1">🎙️ 口播脚本</div>
  <div class="tab" data-idx="2">📺 直播话术</div>
  <div class="tab" data-idx="3">⚡ 三合一</div>
  <div class="tab" data-idx="4">📦 批量</div>
  <div class="tab" data-idx="5">📋 历史</div>
  <div class="tab" data-idx="6">📎 链接抓取</div>
  <div class="tab" data-idx="7">📊 监控</div>
</div>

<!-- 面板0-2: 单工作流 -->
<div class="panel" id="panel0">
  <div class="card">
    <label id="singleLabel">📋 原始文案</label>
    <textarea id="singleInput" placeholder="把你想改写的文案粘贴到这里..."></textarea>
    <div class="hint" id="singleHint">输入原始文案，AI自动改写成抖音风格，并生成标题和话题标签</div>
    <button class="main" id="singleBtn" onclick="runSingle()">🚀 开始生成</button>
    <div class="error" id="singleError"></div>
    <div class="loading" id="singleLoading"><span class="spinner"></span>AI 生成中...</div>
    <div id="singleResults"></div>
  </div>
</div>

<!-- 面板3: 三合一 -->
<div class="panel" id="panel3" style="display:none">
  <div class="card">
    <label>📦 产品信息</label>
    <textarea id="threeInput" placeholder="输入产品信息，同时生成文案改写+口播脚本+直播话术"></textarea>
    <div class="hint">一次输入，三种内容同时生成</div>
    <button class="main" id="threeBtn" onclick="runThree()">⚡ 一键生成三合一</button>
    <div class="error" id="threeError"></div>
    <div class="progress-bar" id="threeProgress"><div class="progress-fill" id="threeFill"></div></div>
    <div id="threeStatus" style="margin:12px 0;display:none">
      <div class="status-row"><span class="status-dot dot-wait" id="threeDot0"></span><span class="status-label">✍️ 文案改写</span></div>
      <div class="status-row"><span class="status-dot dot-wait" id="threeDot1"></span><span class="status-label">🎙️ 口播脚本</span></div>
      <div class="status-row"><span class="status-dot dot-wait" id="threeDot2"></span><span class="status-label">📺 直播话术</span></div>
    </div>
  </div>
  <div id="threeResults"></div>
</div>

<!-- 面板4: 批量 -->
<div class="panel" id="panel4" style="display:none">
  <div class="card">
    <label>📦 多产品输入（每行一条）</label>
    <textarea id="multiInput" style="min-height:160px" placeholder="儿童编程课，6-12岁，名师授课，限时8折&#10;亲子阅读绘本，0-6岁，全套50册，原价199现价99&#10;家庭教育课程，解决孩子拖延磨蹭，7天见效"></textarea>
    <div class="hint">每行一个产品，逐条生成口播脚本</div>
    <button class="main" id="multiBtn" onclick="runMulti()">📦 批量生成</button>
    <div class="error" id="multiError"></div>
    <div class="progress-bar" id="multiProgress"><div class="progress-fill" id="multiFill"></div></div>
    <div id="multiStatus" style="margin:12px 0;font-size:13px;color:#888"></div>
  </div>
  <div id="multiResults"></div>
</div>

<!-- 面板5: 历史 -->
<div class="panel" id="panel5" style="display:none">
  <div class="card">
    <div class="section-title">📋 历史记录<button class="clear-btn" onclick="clearHistory()">清空</button></div>
    <div id="historyList"><div class="empty">暂无历史记录</div></div>
  </div>
</div>

<!-- 面板6: 链接抓取 -->
<div class="panel" id="panel6" style="display:none">
  <div class="card">
    <label>🔗 抖音视频链接</label>
    <textarea id="dyUrl" placeholder="粘贴抖音视频链接或分享链接...&#10;例如：https://v.douyin.com/xxxxx&#10;或：https://www.douyin.com/video/xxxxx"></textarea>
    <div class="hint">粘贴链接后点击提取，自动获取视频文案</div>
    <button class="main" id="dyBtn" onclick="parseDouyin()">🔍 提取文案</button>
    <div class="error" id="dyError"></div>
    <div class="loading" id="dyLoading"><span class="spinner"></span>解析中...</div>
    <div id="dyResult" style="display:none;margin-top:12px">
      <div class="result-block" style="margin-bottom:8px">
        <div class="result-label" id="dyTitle"></div>
        <div class="result-text" id="dyAuthor" style="font-size:12px;color:#888;margin-bottom:8px"></div>
        <div class="result-text" id="dyDesc" style="max-height:200px;overflow-y:auto"></div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="main" style="flex:1;min-width:140px;font-size:13px;padding:12px" onclick="sendToTab(0)">✍️ 发送到文案改写</button>
        <button class="main" style="flex:1;min-width:140px;font-size:13px;padding:12px" onclick="sendToTab(1)">🎙️ 发送到口播脚本</button>
        <button class="main" style="flex:1;min-width:140px;font-size:13px;padding:12px" onclick="sendToTab(2)">📺 发送到直播话术</button>
      </div>
    </div>
    <!-- 评论区 -->
    <div id="dyCommentSection" style="display:none;margin-top:16px">
      <div class="comment-bar">
        <button class="main" style="flex:1;font-size:13px;padding:10px" id="loadCommentBtn" onclick="loadComments()">💬 加载评论</button>
        <button class="clear-btn" style="padding:8px 12px;font-size:12px" onclick="copyAllComments()">📋 一键复制全部</button>
      </div>
      <div class="comment-stats" id="commentStats"></div>
      <div class="comment-list" id="commentList"></div>
      <button class="main" id="loadMoreBtn" style="display:none;margin-top:8px;font-size:13px;padding:10px" onclick="loadMoreComments()">⬇️ 加载更多评论</button>
      <div class="loading" id="commentLoading" style="padding:10px"><span class="spinner"></span>加载中...</div>
    </div>
  </div>
</div>

<!-- 面板7: 数据监控 -->
<div class="panel" id="panel7" style="display:none">
  <div class="card">
    <div class="section-title">➕ 添加监控</div>
    <textarea id="monitorUrl" placeholder="粘贴抖音视频链接..."></textarea>
    <button class="main" onclick="addMonitor()">➕ 添加监控</button>
    <div class="error" id="monitorError"></div>
  </div>
  <div class="card">
    <div class="section-title">📋 监控列表<button class="clear-btn" onclick="refreshAllMonitors()">🔄 全部刷新</button></div>
    <div id="monitorList"><div class="empty">暂无监控视频</div></div>
  </div>
  <div id="monitorTrend" style="display:none">
    <div class="card">
      <div class="section-title">📈 数据趋势</div>
      <div id="trendContent"></div>
    </div>
  </div>
</div>

<script>
var HOST = window.location.hostname;
var API_URL = "http://"+HOST+"/v1/workflows/run";
var SERVER_URL = "http://"+HOST+":8088";

var CONFIGS = [
  {key:"app-WawEE5glIGCLTFK52H3WJDn7", name:"文案改写", inputVar:"original_text", outputs:[{v:"new_text", label:"✨ 改写后的文案"},{v:"title_and_tags", label:"🏷️ 标题+话题标签"}], label:"📋 原始文案", ph:"把你想改写的文案粘贴到这里...", hint:"输入原始文案，AI自动改写成抖音风格，并生成标题和话题标签"},
  {key:"app-Q9nuwRHknypA2phViOwSxCR5", name:"口播脚本", inputVar:"product_info", outputs:[{v:"script", label:"🎙️ 口播脚本"}], label:"📦 产品信息", ph:"描述你的产品：名称、功能、卖点、价格、目标人群...", hint:"输入产品信息，AI生成30秒口播脚本"},
  {key:"app-KX1NL4ioTWgEcaPAibpZCptv", name:"直播话术", inputVar:"product_info", outputs:[{v:"live_script", label:"📺 直播话术"}], label:"📦 产品信息", ph:"描述你的产品：名称、功能、卖点、价格、促销活动...", hint:"输入产品信息，AI生成完整直播话术"}
];
var currentTab = 0;

// === Tab 切换 ===
function switchTab(idx) {
  currentTab = idx;
  var tabs = document.querySelectorAll("#tabBar .tab");
  tabs.forEach(function(t,i){ t.classList.toggle("active", i===idx); });
  for(var i=0;i<8;i++) {
    var p = document.getElementById("panel"+i);
    if(p) {
      if(i===0) {
        p.style.display = (idx<=2) ? "" : "none";
      } else {
        p.style.display = (i===idx) ? "" : "none";
      }
    }
  }
  if(idx===0||idx===1||idx===2) {
    var cfg=CONFIGS[idx];
    document.getElementById("singleLabel").textContent=cfg.label;
    document.getElementById("singleInput").placeholder=cfg.ph;
    document.getElementById("singleHint").textContent=cfg.hint;
    document.getElementById("singleInput").value="";
    document.getElementById("singleResults").innerHTML="";
    document.getElementById("singleError").style.display="none";
    document.getElementById("singleLoading").style.display="none";
  }
  if(idx===5) loadHistory();
  if(idx===7) loadMonitor();
}
document.getElementById("tabBar").addEventListener("click", function(e){
  var t = e.target.closest(".tab");
  if(t) switchTab(parseInt(t.dataset.idx));
});

// === 单工作流 ===
async function runSingle() {
  var text = document.getElementById("singleInput").value.trim();
  if(!text) { showErr("singleError","请先输入内容"); return; }
  var cfg = CONFIGS[currentTab];
  var btn = document.getElementById("singleBtn");
  btn.disabled=true; btn.textContent="生成中...";
  hideErr("singleError");
  document.getElementById("singleLoading").style.display="block";
  document.getElementById("singleResults").innerHTML="";
  try {
    var payload = { inputs:{}, response_mode:"blocking", user:"web-user" };
    payload.inputs[cfg.inputVar] = text;
    var res = await fetch(API_URL, {
      method:"POST",
      headers:{"Authorization":"Bearer "+cfg.key,"Content-Type":"application/json"},
      body:JSON.stringify(payload)
    });
    var data = await res.json();
    var outputs = data.data && data.data.outputs;
    if(!outputs) throw new Error("返回数据异常");
    document.getElementById("singleLoading").style.display="none";
    var html="";
    cfg.outputs.forEach(function(o){
      if(outputs[o.v]) {
        html+='<div class="result-block"><div class="result-label">'+o.label+'</div><div class="result-text" id="txt_'+o.v+'">'+esc(outputs[o.v])+'</div><button class="copy-btn" onclick="copyById(\'txt_'+o.v+'\',this)">复制</button></div>';
      }
    });
    document.getElementById("singleResults").innerHTML=html;
    saveHistory(cfg.name, text, outputs, cfg.outputs);
  } catch(e) {
    document.getElementById("singleLoading").style.display="none";
    showErr("singleError","请求失败："+e.message);
  }
  btn.disabled=false; btn.textContent="🚀 开始生成";
}

// === 三合一 ===
async function runThree() {
  var text = document.getElementById("threeInput").value.trim();
  if(!text) { showErr("threeError","请先输入产品信息"); return; }
  var btn = document.getElementById("threeBtn");
  btn.disabled=true; btn.textContent="生成中...";
  hideErr("threeError");
  document.getElementById("threeResults").innerHTML="";
  document.getElementById("threeStatus").style.display="block";

  var dots = [document.getElementById("threeDot0"),document.getElementById("threeDot1"),document.getElementById("threeDot2")];
  var bar = document.getElementById("threeProgress");
  var fill = document.getElementById("threeFill");
  dots.forEach(function(d){ d.className="status-dot dot-wait"; });
  bar.style.display="block"; fill.style.width="0";
  var done=0;

  function markDone(i) {
    done++;
    fill.style.width = Math.round(done/3*100)+"%";
    dots[i].className="status-dot dot-done";
  }
  function markErr(i) {
    done++;
    fill.style.width = Math.round(done/3*100)+"%";
    dots[i].className="status-dot dot-error";
  }

  var tasks = CONFIGS.map(function(cfg,i) {
    return (async function(){
      dots[i].className="status-dot dot-running";
      try {
        var payload = { inputs:{}, response_mode:"blocking", user:"web-user" };
        payload.inputs[cfg.inputVar] = text;
        var res = await fetch(API_URL, {
          method:"POST",
          headers:{"Authorization":"Bearer "+cfg.key,"Content-Type":"application/json"},
          body:JSON.stringify(payload)
        });
        var data = await res.json();
        var outputs = data.data && data.data.outputs;
        if(!outputs) throw new Error("返回异常");
        markDone(i);
        saveHistory(cfg.name, text, outputs, cfg.outputs);
        return {cfg:cfg, outputs:outputs, ok:true};
      } catch(e) {
        markErr(i);
        return {cfg:cfg, error:e.message, ok:false};
      }
    })();
  });

  var results = await Promise.all(tasks);

  var html="";
  results.forEach(function(r){
    if(r.ok) {
      html+='<div class="card"><div class="result-label">'+r.cfg.name+'</div>';
      r.cfg.outputs.forEach(function(o){
        if(r.outputs[o.v]) {
          var id="three_"+r.cfg.inputVar+"_"+o.v;
          html+='<div class="batch-item"><div class="batch-item-label">'+o.label+'</div><div class="batch-item-text" id="'+id+'">'+esc(r.outputs[o.v])+'</div><button class="copy-btn" onclick="copyById(\''+id+'\',this)">复制</button></div>';
        }
      });
      html+='</div>';
    } else {
      html+='<div class="card"><div class="error" style="display:block">'+r.cfg.name+' 失败：'+r.error+'</div></div>';
    }
  });
  document.getElementById("threeResults").innerHTML=html;
  btn.disabled=false; btn.textContent="⚡ 一键生成三合一";
}

// === 批量 ===
async function runMulti() {
  var raw = document.getElementById("multiInput").value.trim();
  if(!raw) { showErr("multiError","请先输入产品列表"); return; }
  var lines = raw.split("\n").filter(function(l){ return l.trim(); });
  if(lines.length===0) { showErr("multiError","没有有效产品"); return; }

  var btn = document.getElementById("multiBtn");
  btn.disabled=true; btn.textContent="生成中...";
  hideErr("multiError");
  document.getElementById("multiResults").innerHTML="";
  document.getElementById("multiStatus").textContent="";

  var bar = document.getElementById("multiProgress");
  var fill = document.getElementById("multiFill");
  var status = document.getElementById("multiStatus");
  bar.style.display="block"; fill.style.width="0";

  var results = [];
  var cfg = CONFIGS[1]; // 口播脚本

  for(var i=0; i<lines.length; i++) {
    var line = lines[i].trim();
    status.textContent = "正在生成 "+(i+1)+"/"+lines.length+"：…"+line.substring(0,20)+"…";
    try {
      var payload = { inputs:{}, response_mode:"blocking", user:"web-user" };
      payload.inputs[cfg.inputVar] = line;
      var res = await fetch(API_URL, {
        method:"POST",
        headers:{"Authorization":"Bearer "+cfg.key,"Content-Type":"application/json"},
        body:JSON.stringify(payload)
      });
      var data = await res.json();
      var outputs = data.data && data.data.outputs;
      if(outputs) {
        results.push({input:line, outputs:outputs, ok:true});
        saveHistory(cfg.name, line, outputs, cfg.outputs);
      } else {
        results.push({input:line, error:"返回异常", ok:false});
      }
    } catch(e) {
      results.push({input:line, error:e.message, ok:false});
    }
    fill.style.width = Math.round((i+1)/lines.length*100)+"%";
  }

  status.textContent = "全部完成！成功 "+results.filter(function(r){return r.ok;}).length+"/"+results.length+" 条";
  var html="";
  results.forEach(function(r,i){
    html+='<div class="card"><div class="result-label">#'+(i+1)+' '+esc(r.input.substring(0,50))+'</div>';
    if(r.ok) {
      var id="multi_"+i;
      html+='<div class="batch-item"><div class="batch-item-text" id="'+id+'">'+esc(r.outputs.script||"")+'</div><button class="copy-btn" onclick="copyById(\''+id+'\',this)">复制</button></div>';
    } else {
      html+='<div class="error" style="display:block">失败：'+r.error+'</div>';
    }
    html+='</div>';
  });
  document.getElementById("multiResults").innerHTML=html;
  btn.disabled=false; btn.textContent="📦 批量生成";
}

// === 历史记录 ===
function loadHistory() {
  fetch(SERVER_URL+"/api/history")
    .then(function(r){ return r.json(); })
    .then(function(data){
      var el = document.getElementById("historyList");
      if(!data||!Array.isArray(data)||data.length===0) {
        el.innerHTML='<div class="empty">暂无历史记录</div>'; return;
      }
      var html="";
      data.reverse().forEach(function(item){
        var input = item.input||"";
        var preview = input.length>80 ? input.substring(0,80)+"..." : input;
        html+='<div class="history-item">'+
          '<div class="history-meta"><span class="history-type">'+esc(item.template||"")+'</span><span class="history-time">'+esc(item.time||"")+'</span></div>'+
          '<div class="history-input">'+esc(preview)+'</div>'+
          '<div class="history-output">'+esc(item.output||"")+'</div>'+
          '<button class="history-copy" onclick="copyRaw(this)" data-text="'+escAttr(item.output||"")+'">复制内容</button>'+
        '</div>';
      });
      el.innerHTML=html;
    })
    .catch(function(){ document.getElementById("historyList").innerHTML='<div class="error" style="display:block">加载失败</div>'; });
}

function saveHistory(template, input, outputs, outDefs) {
  var sb = [];
  outDefs.forEach(function(o){ if(outputs[o.v]) sb.push(outputs[o.v]); });
  var outputStr = sb.join("\n\n");
  fetch(SERVER_URL+"/api/history", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({template:template, input:input, output:outputStr})
  }).catch(function(){});
}

async function clearHistory() {
  if(!confirm("确定清空所有历史记录？")) return;
  try { await fetch(SERVER_URL+"/api/history/clear"); } catch(e){}
  loadHistory();
}

// === 工具函数 ===
function copyById(id, btn) {
  var el = document.getElementById(id);
  if(!el) return;
  navigator.clipboard.writeText(el.textContent).then(function(){
    btn.textContent="已复制✓"; setTimeout(function(){ btn.textContent="复制"; },1500);
  });
}
function copyRaw(btn) {
  var text = btn.getAttribute("data-text")||"";
  navigator.clipboard.writeText(text).then(function(){
    btn.textContent="已复制✓"; setTimeout(function(){ btn.textContent="复制内容"; },1500);
  });
}
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function escAttr(s) {
  return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function showErr(id, msg) {
  var el=document.getElementById(id);
  el.textContent=msg; el.style.display="block";
}
function hideErr(id) {
  document.getElementById(id).style.display="none";
}

// === 抖音链接抓取 ===
var dyResultCache = null;

async function parseDouyin() {
  var url = document.getElementById("dyUrl").value.trim();
  if(!url) { showErr("dyError","请先粘贴抖音链接"); return; }
  var btn = document.getElementById("dyBtn");
  btn.disabled=true; btn.textContent="解析中...";
  hideErr("dyError");
  document.getElementById("dyResult").style.display="none";
  document.getElementById("dyLoading").style.display="block";
  dyResultCache = null;
  try {
    var api = SERVER_URL+"/api/douyin/parse?url="+encodeURIComponent(url);
    var res = await fetch(api);
    var data = await res.json();
    document.getElementById("dyLoading").style.display="none";
    if(!data.success) throw new Error(data.error||"解析失败");
    dyResultCache = data;
    document.getElementById("dyTitle").textContent = "📹 "+esc(data.desc||"无文案");
    document.getElementById("dyAuthor").textContent = "👤 "+esc(data.author||"未知作者");
    document.getElementById("dyDesc").textContent = data.desc||"";
    document.getElementById("dyResult").style.display="block";
    // 显示评论区模块，重置状态
    document.getElementById("dyCommentSection").style.display="block";
    document.getElementById("commentList").innerHTML="";
    document.getElementById("commentStats").textContent="";
    document.getElementById("loadMoreBtn").style.display="none";
    commentCursor = 0; commentHasMore = false; allComments = [];
    document.getElementById("loadCommentBtn").style.display="";
  } catch(e) {
    document.getElementById("dyLoading").style.display="none";
    showErr("dyError","解析失败："+e.message);
  }
  btn.disabled=false; btn.textContent="🔍 提取文案";
}

function sendToTab(targetIdx) {
  if(!dyResultCache || !dyResultCache.desc) return;
  switchTab(targetIdx);
  document.getElementById("singleInput").value = dyResultCache.desc;
  // 滚动到输入框
  document.getElementById("singleInput").scrollIntoView({behavior:"smooth"});
}

// === 评论模块 ===
var commentCursor = 0;
var commentHasMore = false;
var allComments = [];
var commentUrlCache = "";

function loadComments() {
  if(!dyResultCache) return;
  var url = document.getElementById("dyUrl").value.trim();
  commentUrlCache = url;
  commentCursor = 0;
  allComments = [];
  document.getElementById("commentList").innerHTML="";
  document.getElementById("commentLoading").style.display="block";
  document.getElementById("loadMoreBtn").style.display="none";
  document.getElementById("loadCommentBtn").style.display="none";
  fetchComments(url, 0);
}

function loadMoreComments() {
  if(!commentHasMore) return;
  document.getElementById("commentLoading").style.display="block";
  document.getElementById("loadMoreBtn").style.display="none";
  fetchComments(commentUrlCache, commentCursor);
}

function fetchComments(url, cursor) {
  fetch(SERVER_URL+"/api/douyin/comments?url="+encodeURIComponent(url)+"&cursor="+cursor)
    .then(function(r){ return r.json(); })
    .then(function(data){
      document.getElementById("commentLoading").style.display="none";
      if(!data.success) { showErr("dyError","评论加载失败："+data.error); return; }
      commentCursor = data.cursor || 0;
      commentHasMore = data.has_more || false;
      var newComments = data.comments || [];
      allComments = allComments.concat(newComments);
      renderComments(newComments);
      document.getElementById("commentStats").textContent =
        "已加载 "+allComments.length+" 条"+(data.total?" / 共 "+data.total+" 条":"");
      if(commentHasMore) {
        document.getElementById("loadMoreBtn").style.display="";
      }
      document.getElementById("loadCommentBtn").style.display="none";
    })
    .catch(function(e){
      document.getElementById("commentLoading").style.display="none";
      showErr("dyError","评论加载失败："+e.message);
    });
}

function renderComments(comments) {
  var list = document.getElementById("commentList");
  var html = "";
  comments.forEach(function(c, i){
    var isHot = c.likes > 5;
    var hotClass = isHot ? " hot" : "";
    var idx = allComments.length - comments.length + i;
    html += '<div class="comment-item'+hotClass+'">'+
      '<div class="comment-nick">'+esc(c.nickname||"匿名")+'</div>'+
      '<div class="comment-text" id="cmt_'+idx+'">'+esc(c.text||"")+'</div>'+
      '<div class="comment-meta">'+
        '<span class="comment-likes'+hotClass+'">'+ (c.likes>0?"👍 "+c.likes:"") +'</span>'+
        '<button class="comment-send" onclick="sendCommentToDify('+idx+')">发送到Dify</button>'+
      '</div>'+
    '</div>';
    if(c.reply) {
      html += '<div class="comment-item" style="margin-left:16px;border-left:2px solid #fe2c55">'+
        '<div class="comment-nick" style="color:#ff6b6b">👤 作者回复</div>'+
        '<div class="comment-text">'+esc(c.reply)+'</div>'+
      '</div>';
    }
  });
  list.insertAdjacentHTML("beforeend", html);
}

function sendCommentToDify(idx) {
  if(idx < 0 || idx >= allComments.length) return;
  var text = allComments[idx].text;
  if(!text) return;
  // 发送到口播脚本（tab 1）
  switchTab(1);
  document.getElementById("singleInput").value = text;
  document.getElementById("singleInput").scrollIntoView({behavior:"smooth"});
}

function copyAllComments() {
  if(allComments.length === 0) return;
  var text = allComments.map(function(c, i){
    return (i+1)+". "+c.nickname+"：\n"+c.text+"\n";
  }).join("\n");
  navigator.clipboard.writeText(text).then(function(){
    var btn = event.target;
    btn.textContent="已复制✓"; setTimeout(function(){ btn.textContent="📋 一键复制全部"; },1500);
  });
}

// === 数据监控模块 ===
function loadMonitor() {
  fetch(SERVER_URL+"/api/monitor/list")
    .then(function(r){ return r.json(); })
    .then(function(data){
      var el = document.getElementById("monitorList");
      if(!data||data.length===0) { el.innerHTML='<div class="empty">暂无监控视频</div>'; return; }
      var html="";
      data.forEach(function(v){
        var latest = v.latest || {};
        html+='<div class="monitor-item">'+
          '<div class="monitor-title">📹 '+esc(v.title||"未命名")+'</div>'+
          '<div class="monitor-meta">添加于 '+esc(v.added||"")+' | 数据点: '+(v.history?v.history.length:0)+'</div>'+
          '<div class="monitor-stats">'+
            '<span class="monitor-stat">👍 <span>'+fmt(latest.likes)+'</span></span>'+
            '<span class="monitor-stat">💬 <span>'+fmt(latest.comments)+'</span></span>'+
            '<span class="monitor-stat">🔁 <span>'+fmt(latest.shares)+'</span></span>'+
            '<span class="monitor-stat">⭐ <span>'+fmt(latest.collects)+'</span></span>'+
          '</div>'+
          '<div class="monitor-actions">'+
            '<button onclick="refreshMonitor('+v.id+')">🔄 刷新</button>'+
            '<button onclick="removeMonitor('+v.id+')">🗑️ 删除</button>'+
            '<button onclick="showTrend('+v.id+')">📈 趋势</button>'+
          '</div>'+
        '</div>';
      });
      el.innerHTML=html;
    })
    .catch(function(){ document.getElementById("monitorList").innerHTML='<div class="error" style="display:block">加载失败</div>'; });
}

function addMonitor() {
  var url = document.getElementById("monitorUrl").value.trim();
  if(!url) { showErr("monitorError","请粘贴抖音链接"); return; }
  hideErr("monitorError");
  fetch(SERVER_URL+"/api/monitor/add", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({url:url, title:""})
  }).then(function(r){ return r.json(); })
    .then(function(data){
      if(data.success) {
        document.getElementById("monitorUrl").value="";
        loadMonitor();
      } else {
        showErr("monitorError",data.error||"添加失败");
      }
    }).catch(function(e){ showErr("monitorError","请求失败"); });
}

function refreshMonitor(id) {
  fetch(SERVER_URL+"/api/monitor/refresh", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id:id})
  }).then(function(r){ return r.json(); })
    .then(function(){ loadMonitor(); });
}

function refreshAllMonitors() {
  fetch(SERVER_URL+"/api/monitor/refresh_all")
    .then(function(){ loadMonitor(); });
}

function removeMonitor(id) {
  if(!confirm("确定删除该监控？")) return;
  fetch(SERVER_URL+"/api/monitor/remove", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id:id})
  }).then(function(r){ return r.json(); })
    .then(function(){ loadMonitor(); });
}

function showTrend(id) {
  fetch(SERVER_URL+"/api/monitor/list")
    .then(function(r){ return r.json(); })
    .then(function(data){
      var v = data.find(function(item){ return item.id===id; });
      if(!v || !v.history || v.history.length===0) return;
      document.getElementById("monitorTrend").style.display="";
      var h = v.history;
      var html='<table class="trend-table"><tr><th>时间</th><th>👍点赞</th><th>💬评论</th><th>🔁分享</th><th>⭐收藏</th></tr>';
      for(var i=h.length-1; i>=0; i--) {
        var row = h[i];
        var isLatest = (i===h.length-1);
        html+='<tr class="'+(isLatest?'latest':'')+'">'+
          '<td>'+esc(row.time||"")+'</td>'+
          '<td>'+fmt(row.likes)+'</td>'+
          '<td>'+fmt(row.comments)+'</td>'+
          '<td>'+fmt(row.shares)+'</td>'+
          '<td>'+fmt(row.collects)+'</td>'+
        '</tr>';
      }
      html+='</table>';
      document.getElementById("trendContent").innerHTML=html;
      document.getElementById("monitorTrend").scrollIntoView({behavior:"smooth"});
    });
}

function fmt(n) { return n!=null ? n.toLocaleString() : "—"; }

switchTab(0);
</script>
